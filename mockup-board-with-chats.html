<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=560">
<title>Board — Chats + Images</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --brand: #6C63FF;
    --brand-text: #8580FF;
    --brand-muted: rgba(108, 99, 255, 0.12);
    --brand-dim: rgba(108, 99, 255, 0.07);
    --brand-border: rgba(108, 99, 255, 0.25);
    --surface-base: #16151E;
    --surface-panel: rgba(22, 21, 30, 0.96);
    --surface-elevated: rgba(31, 29, 42, 0.92);
    --surface-hover: rgba(108, 99, 255, 0.05);
    --border-dim: rgba(108, 99, 255, 0.08);
    --border-active: rgba(108, 99, 255, 0.13);
    --text-primary: rgba(242, 240, 255, 0.93);
    --text-secondary: rgba(175, 172, 205, 0.75);
    --text-dim: rgba(140, 137, 175, 0.70);
    --font-display: 'Outfit', -apple-system, system-ui, sans-serif;
    --radius-sm: 8px;
    --radius-md: 12px;
  }

  body {
    font-family: var(--font-display);
    background: var(--surface-base);
    color: var(--text-primary);
    width: 560px;
    margin: 40px auto;
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 1px solid var(--border-active);
    box-shadow: 0 16px 48px rgba(0,0,0,0.40);
  }

  /* ── Header ── */
  .board-header {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border-dim);
    min-height: 50px;
    gap: 10px;
  }

  .glimpse-icon {
    display: inline-flex;
    width: 28px;
    height: 28px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .glimpse-icon:hover svg path:first-child {
    transform: translateY(-6px);
  }

  .glimpse-icon svg path {
    transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    transform-origin: 260px 212px;
  }

  .header-spacer { flex: 1; }

  .header-btn {
    width: 28px;
    height: 28px;
    border: 1.5px solid var(--border-active);
    border-radius: 8px;
    background: transparent;
    color: var(--brand-text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s ease;
  }
  .header-btn:hover {
    background: var(--brand-dim);
    border-color: var(--brand-border);
  }

  /* ── Tabs ── */
  .board-tabs {
    display: flex;
    gap: 0;
    padding: 0 14px;
    border-bottom: 1px solid var(--border-dim);
  }

  .board-tab {
    padding: 10px 16px 9px;
    font-family: var(--font-display);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    border: none;
    background: none;
    position: relative;
    transition: color 0.15s ease;
    letter-spacing: 0.01em;
  }

  .board-tab:hover {
    color: var(--text-secondary);
  }

  .board-tab.active {
    color: var(--text-primary);
  }

  .board-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 16px;
    right: 16px;
    height: 1.5px;
    background: var(--brand);
    border-radius: 1px;
  }

  .tab-count {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 4px;
    font-weight: 400;
  }

  .board-tab.active .tab-count {
    color: var(--text-secondary);
  }

  /* ── Tab content ── */
  .tab-content {
    display: none;
    flex-direction: column;
    overflow-y: auto;
    height: 520px;
  }
  .tab-content.active {
    display: flex;
  }

  /* ── Chat list ── */
  .chat-list {
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .chat-card {
    display: flex;
    gap: 12px;
    padding: 12px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.12s ease;
    border: none;
    background: none;
    text-align: left;
    width: 100%;
    font-family: var(--font-display);
    align-items: flex-start;
  }

  .chat-card:hover {
    background: var(--surface-hover);
  }

  .chat-card:active {
    background: var(--brand-dim);
  }

  .chat-card-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: var(--brand-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .chat-card-icon svg {
    color: var(--brand-text);
    opacity: 0.7;
  }

  .chat-card-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .chat-card-top {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .chat-card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }

  .chat-card-time {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .chat-card-preview {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .chat-card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }

  .chat-card-count {
    font-size: 10.5px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .chat-card-count svg {
    opacity: 0.5;
  }

  /* Has-image indicator */
  .chat-card-has-image {
    font-size: 10.5px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .chat-card-has-image svg {
    opacity: 0.5;
  }

  /* ── Time group labels ── */
  .time-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 12px 14px 4px;
  }

  /* ── Image grid (same as existing board) ── */
  .image-grid-area {
    padding: 16px;
  }

  .image-time-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .image-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .image-card {
    aspect-ratio: 16 / 10;
    border-radius: var(--radius-sm);
    overflow: hidden;
    cursor: pointer;
    position: relative;
    border: 1px solid var(--border-dim);
    transition: border-color 0.15s ease, transform 0.15s ease;
    background: var(--surface-elevated);
  }

  .image-card:hover {
    border-color: var(--brand-border);
    transform: scale(1.02);
  }

  .image-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .image-card-time {
    position: absolute;
    bottom: 4px;
    right: 6px;
    font-size: 9px;
    color: var(--text-secondary);
    background: rgba(22, 21, 30, 0.7);
    padding: 1px 5px;
    border-radius: 3px;
    backdrop-filter: blur(4px);
  }

  /* ── Scrollbar ── */
  .tab-content::-webkit-scrollbar { width: 5px; }
  .tab-content::-webkit-scrollbar-track { background: transparent; }
  .tab-content::-webkit-scrollbar-thumb { background: var(--brand-muted); border-radius: 3px; }

  /* ── Active card (just opened) ── */
  .chat-card.recent .chat-card-title {
    color: var(--brand-text);
  }

  /* ── Separator ── */
  .list-separator {
    height: 1px;
    background: var(--border-dim);
    margin: 2px 12px;
  }
</style>
</head>

<script>
function switchTab(tab) {
  document.querySelectorAll('.board-tab').forEach(t => t.classList.remove('active'))
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'))
  if (tab === 'chats') {
    document.querySelectorAll('.board-tab')[0].classList.add('active')
    document.getElementById('tab-chats').classList.add('active')
  } else {
    document.querySelectorAll('.board-tab')[1].classList.add('active')
    document.getElementById('tab-images').classList.add('active')
  }
}
</script>
